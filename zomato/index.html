<h2>Responsive design</h2>
<p>use to change the style on small screen</p>
<div class="box">resize the window</div>

<div class="screen -label" id="label">
    <div class="cards">

    <script>
        function checkscreen(){
            var label=document.getElementByID("label")
            if(window.innerwidth<=600){
                label.innerText="you are on small screen"
            }
            else{
                label.innerText="you are on a big screen"
            }
        }
        window.addEventListener("resize",checkscreen);
        checkscreen();
    </script>
